<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 智慧拆分系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; }
        .drop-zone--over { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        .loader {
            border: 4px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 20px; height: 20px;
            animation: spinner 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spinner { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 text-gray-800">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">PDF 智慧拆分系統</h1>
            <p class="text-gray-500 text-sm">支援文字型與影像型 PDF，可依頁數或關鍵字自動分割</p>
        </header>

        <div class="bg-amber-50 border border-amber-200 rounded-2xl p-6 mb-6">
            <h3 class="font-bold text-amber-800 mb-2 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                Gemini API Key（影像辨識模式才需填寫）
            </h3>
            <input type="password" id="apiKeyInput"
                placeholder="僅影像型 PDF 需要，文字型可留空"
                class="w-full border border-amber-300 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
            <p class="text-xs text-amber-600 mt-2">※ 請勿將 API Key 寫入程式碼並上傳至 Git，否則 Google 會自動封鎖該金鑰。</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-6 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <h3 class="font-bold text-blue-700">基礎分割設定</h3>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">每幾頁分割一次</label>
                    <input type="number" id="pageSizeInput" value="10" min="1"
                        class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">PDF 來源類型</label>
                    <div class="flex space-x-6">
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="pdfType" value="text" checked class="text-blue-600">
                            <span class="ml-2 text-sm">文字型（解析文字）</span>
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="pdfType" value="image" class="text-blue-600">
                            <span class="ml-2 text-sm">影像型（AI 辨識）</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="font-bold text-blue-700">智慧判斷設定</h3>
                <div class="flex items-center">
                    <input type="checkbox" id="enableKeywordCheck" checked
                        class="h-4 w-4 text-blue-600 rounded cursor-pointer">
                    <label for="enableKeywordCheck" class="ml-2 text-sm font-medium text-gray-700 cursor-pointer">
                        啟用關鍵字自動提前分割
                    </label>
                </div>
                <div id="keywordConfigArea" class="space-y-1">
                    <label class="block text-sm font-medium text-gray-700">偵測關鍵字</label>
                    <input type="text" id="keywordInput" value="(續次頁)"
                        class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                    <p class="text-xs text-gray-400">當該關鍵字出現在分割邊界頁時，將自動提前一頁分割</p>
                </div>
            </div>
        </div>

        <div id="dropZone"
            class="relative bg-white border-2 border-dashed border-gray-300 rounded-2xl p-10 text-center transition-all cursor-pointer hover:border-blue-400 hover:bg-blue-50 group shadow-sm overflow-hidden">
            <input type="file" id="fileInput" accept=".pdf" class="hidden">
            <div class="flex flex-col items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 text-gray-400 group-hover:text-blue-500 mb-4 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <p class="text-lg font-medium text-gray-700">拖放 PDF 至此，或點擊選擇檔案</p>
                <p class="text-sm text-gray-400 mt-1">僅支援 .pdf 格式</p>
            </div>
        </div>

        <div id="confirmSection" class="mt-6 bg-blue-50 border border-blue-200 rounded-2xl p-5 hidden">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div>
                    <p class="text-xs text-blue-500 mb-0.5">已選擇檔案</p>
                    <p id="selectedFileName" class="text-base font-bold text-gray-800 break-all"></p>
                </div>
                <div class="flex space-x-3 flex-shrink-0">
                    <button id="cancelBtn"
                        class="bg-white text-gray-600 px-5 py-2.5 rounded-xl border border-gray-300 hover:bg-gray-50 text-sm font-medium">
                        取消
                    </button>
                    <button id="startProcessBtn"
                        class="bg-blue-600 text-white px-7 py-2.5 rounded-xl font-bold hover:bg-blue-700 text-sm">
                        確認並開始執行
                    </button>
                </div>
            </div>
        </div>

        <div id="statusSection" class="mt-6 hidden">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-semibold text-gray-800">處理清單</h2>
                <div class="flex items-center space-x-4">
                    <span id="progressText" class="text-sm text-gray-500"></span>
                    <button id="downloadAllBtn"
                        class="hidden bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-700">
                        ⬇ 下載全部 (ZIP)
                    </button>
                    <button id="resetBtn"
                        class="text-sm text-red-500 hover:underline">
                        重新開始
                    </button>
                </div>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2 mb-5">
                <div id="progressFill"
                    class="bg-blue-600 h-2 rounded-full transition-all duration-500"
                    style="width: 0%"></div>
            </div>
            <div id="fileList" class="space-y-2"></div>
        </div>

        <div id="messageBox"
            class="fixed bottom-5 right-5 opacity-0 translate-y-4 transition-all duration-300 bg-gray-800 text-white px-5 py-3 rounded-xl shadow-lg z-50 text-sm pointer-events-none">
        </div>
    </div>

    <canvas id="renderCanvas" style="display:none;"></canvas>

    <script>
        // =============================================
        //  全域設定 (修正 GitHub Pages Worker 跨域問題)
        // =============================================
        fetch('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js')
            .then(res => res.blob())
            .then(blob => {
                pdfjsLib.GlobalWorkerOptions.workerSrc = URL.createObjectURL(blob);
            }).catch(err => {
                console.error('Worker Blob 載入失敗，退回預設', err);
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            });

        const { PDFDocument } = PDFLib;

        // =============================================
        //  DOM 元素取得
        // =============================================
        const dropZone          = document.getElementById('dropZone');
        const fileInput         = document.getElementById('fileInput');
        const confirmSection    = document.getElementById('confirmSection');
        const statusSection     = document.getElementById('statusSection');
        const fileList          = document.getElementById('fileList');
        const progressFill      = document.getElementById('progressFill');
        const progressText      = document.getElementById('progressText');
        const downloadAllBtn    = document.getElementById('downloadAllBtn');
        const messageBox        = document.getElementById('messageBox');
        const renderCanvas      = document.getElementById('renderCanvas');
        const apiKeyInput       = document.getElementById('apiKeyInput');
        const enableKeywordCheck = document.getElementById('enableKeywordCheck');
        const keywordConfigArea = document.getElementById('keywordConfigArea');

        let generatedFiles = [];
        let currentFile    = null;
        let messageTimer   = null;

        // =============================================
        //  UI 互動綁定
        // =============================================
        enableKeywordCheck.addEventListener('change', () => {
            if (enableKeywordCheck.checked) {
                keywordConfigArea.classList.remove('hidden');
            } else {
                keywordConfigArea.classList.add('hidden');
            }
        });

        // 點擊 dropZone 觸發選擇檔案
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drop-zone--over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drop-zone--over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-zone--over');
            if (e.dataTransfer.files.length) prepareFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) prepareFile(e.target.files[0]);
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            currentFile = null;
            fileInput.value = '';
            confirmSection.classList.add('hidden');
        });

        document.getElementById('startProcessBtn').addEventListener('click', () => {
            const pdfType = document.querySelector('input[name="pdfType"]:checked').value;
            if (pdfType === 'image' && !apiKeyInput.value.trim()) {
                showMessage('影像辨識模式請先填入 Gemini API Key', 'error');
                return;
            }
            confirmSection.classList.add('hidden');
            handleFile(currentFile);
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            location.reload();
        });

        // =============================================
        //  AI 辨識相關函式 (沿用原有的重試與倒數機制)
        // =============================================
        const GEMINI_MODELS = [
            'gemini-2.0-flash',
            'gemini-2.0-flash-lite',
            'gemini-1.5-flash-latest'
        ];
        const MAX_RETRY = 4;

        function showCountdown(seconds, pageLabel) {
            return new Promise(resolve => {
                let remaining = seconds;
                const tick = () => {
                    progressText.innerHTML = `⏳ API 限流，等待 <strong>${remaining}</strong> 秒後自動重試（${pageLabel}）`;
                    if (remaining <= 0) {
                        resolve();
                    } else {
                        remaining--;
                        setTimeout(tick, 1000);
                    }
                };
                tick();
            });
        }

        function parseRetrySeconds(errMsg, headers) {
            if (headers) {
                const ra = headers.get('Retry-After');
                if (ra) {
                    const v = parseFloat(ra);
                    if (!isNaN(v)) return Math.ceil(v);
                }
            }
            const match = errMsg?.match(/retry in ([\d.]+)s/i);
            if (match) return Math.ceil(parseFloat(match[1]));
            return 60;
        }

        async function callGeminiAPI(base64Data, prompt, modelName, userKey) {
            const payload = {
                contents: [{
                    parts: [
                        { text: prompt },
                        { inlineData: { mimeType: "image/png", data: base64Data } }
                    ]
                }]
            };
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${userKey}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                const error = new Error(err?.error?.message || `HTTP ${response.status}`);
                error.status = response.status;
                error.headers = response.headers;
                throw error;
            }
            return response.json();
        }

        async function checkWithAI(base64Data, keyword, pageLabel = '') {
            const userKey = apiKeyInput.value.trim();
            const prompt  = `請辨識這張圖片中是否包含文字「${keyword}」。只回傳 JSON 格式，不要加 Markdown 標記：{"found": true} 或 {"found": false}`;

            let lastError = null;

            for (const modelName of GEMINI_MODELS) {
                for (let attempt = 1; attempt <= MAX_RETRY; attempt++) {
                    try {
                        console.log(`[Gemini] 模型：${modelName}，第 ${attempt} 次嘗試`);
                        const result = await callGeminiAPI(base64Data, prompt, modelName, userKey);
                        const text = result?.candidates?.[0]?.content?.parts?.[0]?.text || '{"found": false}';
                        const cleanJson = text.replace(/```json|```/gi, '').trim();
                        try {
                            return JSON.parse(cleanJson).found === true;
                        } catch {
                            console.warn(`[Gemini] 回傳無法解析，視為未找到:`, text);
                            return false;
                        }
                    } catch (err) {
                        lastError = err;
                        if (err.status === 404) {
                            console.warn(`[Gemini] 模型 ${modelName} 不可用 (404)，切換備援...`);
                            break;
                        }
                        if (err.status === 429) {
                            if (attempt >= MAX_RETRY) {
                                console.warn(`[Gemini] ${modelName} 重試 ${MAX_RETRY} 次仍限流，切換備援模型`);
                                break;
                            }
                            const waitSec = parseRetrySeconds(err.message, err.headers);
                            console.warn(`[Gemini] 429 限流，等待 ${waitSec} 秒後重試（第 ${attempt}/${MAX_RETRY} 次）`);
                            await showCountdown(waitSec, pageLabel);
                            continue;
                        }
                        throw new Error(`Gemini API 錯誤 (${modelName})：${err.message}`);
                    }
                }
            }
            throw new Error(`Gemini 所有模型均無法使用。最後錯誤：${lastError?.message}`);
        }

        // =============================================
        //  核心處理流程
        // =============================================
        function prepareFile(file) {
            if (file.type !== 'application/pdf') {
                showMessage('請上傳 PDF 格式的檔案', 'error');
                return;
            }
            currentFile = file;
            document.getElementById('selectedFileName').innerText = file.name;
            confirmSection.classList.remove('hidden');
            statusSection.classList.add('hidden');
            fileList.innerHTML = '';
            generatedFiles = [];
        }

        async function handleFile(file) {
            const pageSize      = Math.max(1, parseInt(document.getElementById('pageSizeInput').value) || 10);
            const pdfType       = document.querySelector('input[name="pdfType"]:checked').value;
            const targetKeyword = document.getElementById('keywordInput').value.trim();
            const useKeyword    = enableKeywordCheck.checked && targetKeyword;

            statusSection.classList.remove('hidden');
            fileList.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">初始化中...</p>';
            progressFill.style.width = '0%';
            progressText.innerText = '';
            generatedFiles = [];
            downloadAllBtn.classList.add('hidden');

            try {
                // 取得原始檔案資料
                const arrayBuffer = await file.arrayBuffer();

                // 修正：利用 slice(0) 複製一份獨立的記憶體給 pdf.js 使用，避免被轉移剝離
                const pdfJsBuffer = arrayBuffer.slice(0);
                const dataUint8 = new Uint8Array(pdfJsBuffer);
                const pdfJsDoc = await pdfjsLib.getDocument({ data: dataUint8 }).promise;
                const totalPages = pdfJsDoc.numPages;

                // 原本的 arrayBuffer 保留給 pdf-lib 安全地進行拆分處理
                const srcDoc = await PDFDocument.load(arrayBuffer);

                fileList.innerHTML = '';
                let currentStart = 0;

                while (currentStart < totalPages) {
                    let targetEnd = Math.min(currentStart + pageSize - 1, totalPages - 1);

                    if (useKeyword && targetEnd < totalPages - 1) {
                        const checkPageIndex0 = targetEnd;
                        const page = await pdfJsDoc.getPage(checkPageIndex0 + 1);
                        let keywordFound = false;

                        try {
                            if (pdfType === 'text') {
                                const textContent = await page.getTextContent();
                                const pageText = textContent.items.map(item => item.str).join(' ');
                                keywordFound = pageText.includes(targetKeyword);
                            } else {
                                const viewport = page.getViewport({ scale: 1.5 });
                                const ctx = renderCanvas.getContext('2d');
                                renderCanvas.width  = viewport.width;
                                renderCanvas.height = viewport.height;
                                await page.render({ canvasContext: ctx, viewport }).promise;
                                const base64 = renderCanvas.toDataURL('image/png').split(',')[1];
                                
                                keywordFound = await checkWithAI(base64, targetKeyword, `第 ${checkPageIndex0+1} 頁`).catch(err => {
                                    console.warn('AI 辨識失敗，跳過此頁關鍵字判斷：', err.message);
                                    showMessage(`AI 辨識警告：${err.message}`, 'error');
                                    return false;
                                });
                            }
                        } catch (pageErr) {
                            console.warn('頁面讀取失敗，跳過關鍵字偵測：', pageErr);
                        }

                        if (keywordFound) {
                            targetEnd = Math.max(currentStart, targetEnd - 1);
                        }
                    }

                    const newPdf = await PDFDocument.create();
                    const pageIndices = [];
                    for (let i = currentStart; i <= targetEnd; i++) pageIndices.push(i);

                    const copiedPages = await newPdf.copyPages(srcDoc, pageIndices);
                    copiedPages.forEach(p => newPdf.addPage(p));

                    const pdfBytes = await newPdf.save();
                    const blob     = new Blob([pdfBytes], { type: 'application/pdf' });
                    const fileName = `第${currentStart + 1}-${targetEnd + 1}頁.pdf`;

                    generatedFiles.push({ name: fileName, blob });
                    createFileItem(fileName, URL.createObjectURL(blob), targetEnd - currentStart + 1);

                    const pct = Math.round(((targetEnd + 1) / totalPages) * 100);
                    progressFill.style.width = `${pct}%`;
                    progressText.innerText   = `${targetEnd + 1} / ${totalPages} 頁（${pct}%）`;

                    currentStart = targetEnd + 1;
                }

                downloadAllBtn.classList.remove('hidden');
                showMessage('✅ 處理完成！', 'success');

            } catch (error) {
                console.error('處理失敗：', error);
                showMessage(`❌ 錯誤：${error.message}`, 'error');
                fileList.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-red-600 text-sm">
                        <strong>處理失敗</strong><br>${error.message}
                    </div>`;
            }
        }

        // =============================================
        //  UI 與下載輔助函式
        // =============================================
        function createFileItem(name, url, pageCount) {
            const div = document.createElement('div');
            div.className = 'flex items-center justify-between bg-white px-4 py-3 rounded-xl border border-gray-200 hover:border-blue-300 transition-colors';
            div.innerHTML = `
                <div class="flex items-center space-x-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    <div>
                        <p class="text-sm font-medium text-gray-800">${name}</p>
                        <p class="text-xs text-gray-400">${pageCount} 頁</p>
                    </div>
                </div>
                <a href="${url}" download="${name}"
                   class="text-blue-600 text-sm font-medium hover:text-blue-800 hover:underline">
                    ⬇ 下載
                </a>`;
            fileList.appendChild(div);
        }

        function showMessage(text, type = 'success') {
            messageBox.innerText = text;
            messageBox.style.backgroundColor = type === 'error' ? '#ef4444' : '#10b981';
            messageBox.classList.remove('opacity-0', 'translate-y-4');
            clearTimeout(messageTimer);
            messageTimer = setTimeout(() => {
                messageBox.classList.add('opacity-0', 'translate-y-4');
            }, 4500);
        }

        downloadAllBtn.addEventListener('click', async () => {
            if (!generatedFiles.length) return;
            showMessage('正在壓縮打包...', 'success');
            const zip = new JSZip();
            generatedFiles.forEach(f => zip.file(f.name, f.blob));
            const content = await zip.generateAsync({ type: 'blob' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `Split_PDFs_${Date.now()}.zip`;
            link.click();
        });
    </script>
</body>
</html>
