<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 智慧拆分工具 (穩定修正版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', 'Microsoft JhengHei', sans-serif; }
        .drop-zone--over { border-color: #3b82f6; background-color: #eff6ff; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8 text-gray-800">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-900 mb-2">PDF 智慧拆分器</h1>
            <p class="text-gray-600">支援文字解析與 AI 影像辨識分割</p>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-8 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-4 border-r border-gray-100 pr-4">
                <h3 class="font-bold text-lg text-blue-700">🔑 API 設定</h3>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Gemini API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="請貼上 API Key" class="w-full border-gray-300 rounded-lg shadow-sm border p-2 text-sm">
                </div>
            </div>

            <div class="space-y-4 border-r border-gray-100 pr-4">
                <h3 class="font-bold text-lg text-blue-700">📋 基礎分割</h3>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">每幾頁分割一次？</label>
                    <input type="number" id="pageSizeInput" value="10" min="1" class="w-full border-gray-300 rounded-lg shadow-sm border p-2 text-sm">
                </div>
                <div class="flex space-x-4">
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="pdfType" value="text" checked class="text-blue-600">
                        <span class="ml-2 text-sm">文字型</span>
                    </label>
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="pdfType" value="image" class="text-blue-600">
                        <span class="ml-2 text-sm">影像型 (AI)</span>
                    </label>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="font-bold text-lg text-blue-700">🧠 智慧分頁</h3>
                <div class="flex items-center">
                    <input type="checkbox" id="enableKeywordCheck" checked class="h-4 w-4 text-blue-600 border-gray-300 rounded">
                    <label for="enableKeywordCheck" class="ml-2 text-sm font-medium text-gray-700">啟用關鍵字提前分割</label>
                </div>
                <input type="text" id="keywordInput" value="(續次頁)" class="w-full border-gray-300 rounded-lg shadow-sm border p-2 text-sm">
            </div>
        </div>

        <div id="dropZone" class="bg-white border-2 border-dashed border-gray-300 rounded-2xl p-10 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-all shadow-sm">
            <input type="file" id="fileInput" accept=".pdf" class="hidden">
            <p class="text-lg font-medium text-gray-700">拖放檔案或點擊上傳 PDF</p>
        </div>

        <div id="statusSection" class="mt-8 hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold">處理清單</h2>
                <div class="flex space-x-3">
                    <button id="downloadAllBtn" class="hidden bg-green-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-700">下載全部 (ZIP)</button>
                    <button id="resetBtn" class="text-sm text-red-500 hover:underline">重置</button>
                </div>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5 mb-6 overflow-hidden">
                <div id="progressFill" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <div id="fileList" class="space-y-3"></div>
        </div>
    </div>

    <canvas id="renderCanvas" style="display:none;"></canvas>
    <div id="messageBox" class="fixed bottom-4 right-4 transform translate-y-20 opacity-0 transition-all duration-300 bg-gray-800 text-white px-6 py-3 rounded-lg z-50"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const { PDFDocument } = PDFLib;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusSection = document.getElementById('statusSection');
        const fileList = document.getElementById('fileList');
        const progressFill = document.getElementById('progressFill');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const renderCanvas = document.getElementById('renderCanvas');

        let generatedFiles = [];

        // 自動記憶 API Key
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) apiKeyInput.value = savedKey;
        apiKeyInput.addEventListener('change', () => localStorage.setItem('gemini_api_key', apiKeyInput.value));

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drop-zone--over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drop-zone--over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-zone--over');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });
        document.getElementById('resetBtn').addEventListener('click', () => location.reload());

        // --- 核心 AI 辨識函數修正 ---
        async function checkWithAI(base64Data, keyword, apiKey) {
            // 修正點 1: 使用穩定型號名稱
            const modelName = "gemini-1.5-flash"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            
            const prompt = `你是一個文件分析師。請辨識圖片中是否包含文字：「${keyword}」。請僅回答 JSON 格式：{"found": true} 或 {"found": false}。`;
            
            const payload = {
                contents: [{
                    parts: [
                        { text: prompt },
                        { inlineData: { mimeType: "image/png", data: base64Data } }
                    ]
                }],
                generationConfig: { responseMimeType: "application/json" }
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || `HTTP ${response.status}`);
                }

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                
                // 修正點 2: 去除 AI 可能產生的 Markdown 標籤
                const cleanJson = text.replace(/```json|```/g, "").trim();
                return JSON.parse(cleanJson).found;
            } catch (err) {
                console.error("AI 辨識詳細錯誤:", err);
                throw err; 
            }
        }

        async function handleFile(file) {
            const apiKey = apiKeyInput.value.trim();
            const pdfType = document.querySelector('input[name="pdfType"]:checked').value;
            if (pdfType === 'image' && !apiKey) return showMessage('影像型辨識必須輸入 API Key', 'error');

            statusSection.classList.remove('hidden');
            fileList.innerHTML = '<p class="text-center p-4">正在智慧分析並切割 PDF...</p>';
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdfJsDoc = await pdfjsLib.getDocument({ data: arrayBuffer.slice(0) }).promise;
                const srcDoc = await PDFDocument.load(arrayBuffer);
                const totalPages = pdfJsDoc.numPages;

                fileList.innerHTML = '';
                let currentStart = 0;
                const pageSize = parseInt(document.getElementById('pageSizeInput').value) || 10;
                const targetKeyword = document.getElementById('keywordInput').value;

                while (currentStart < totalPages) {
                    let targetEnd = Math.min(currentStart + pageSize - 1, totalPages - 1);

                    // 智慧判定邏輯
                    if (document.getElementById('enableKeywordCheck').checked && targetEnd < totalPages - 1) {
                        const checkIdx = targetEnd + 1; 
                        let keywordFound = false;

                        if (pdfType === 'text') {
                            const page = await pdfJsDoc.getPage(checkIdx + 1);
                            const content = await page.getTextContent();
                            const text = content.items.map(i => i.str).join('');
                            if (text.includes(targetKeyword)) keywordFound = true;
                        } else {
                            // 修正點 3: 影像處理邏輯優化
                            const page = await pdfJsDoc.getPage(checkIdx + 1);
                            const viewport = page.getViewport({ scale: 2.0 }); // 提高解析度確保辨識率
                            const ctx = renderCanvas.getContext('2d');
                            renderCanvas.height = viewport.height;
                            renderCanvas.width = viewport.width;
                            await page.render({ canvasContext: ctx, viewport }).promise;
                            const base64 = renderCanvas.toDataURL('image/png').split(',')[1];
                            keywordFound = await checkWithAI(base64, targetKeyword, apiKey);
                        }

                        if (keywordFound) {
                            console.log(`第 ${checkIdx + 1} 頁發現關鍵字，執行分割調整。`);
                            // 根據你的需求調整分割位置，目前邏輯是將該頁留給下一個檔案
                        }
                    }

                    // 生成 PDF
                    const newPdf = await PDFDocument.create();
                    const indices = Array.from({length: targetEnd - currentStart + 1}, (_, i) => currentStart + i);
                    const pages = await newPdf.copyPages(srcDoc, indices);
                    pages.forEach(p => newPdf.addPage(p));
                    
                    const bytes = await newPdf.save();
                    const blob = new Blob([bytes], { type: 'application/pdf' });
                    const name = `${currentStart + 1}-${targetEnd + 1}.pdf`;
                    generatedFiles.push({ name, blob });
                    createFileItem(name, URL.createObjectURL(blob), `${indices.length} 頁`);

                    currentStart = targetEnd + 1;
                    progressFill.style.width = `${(currentStart / totalPages) * 100}%`;
                }

                downloadAllBtn.classList.remove('hidden');
                showMessage('處理完成', 'success');
            } catch (err) {
                showMessage(`失敗: ${err.message}`, 'error');
                fileList.innerHTML = `<p class="text-red-500 text-center">錯誤: ${err.message}</p>`;
            }
        }

        function createFileItem(name, url, info) {
            const div = document.createElement('div');
            div.className = 'flex items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-gray-100';
            div.innerHTML = `<div><p class="font-semibold text-gray-700">${name}</p><p class="text-xs text-gray-400">${info}</p></div>
                             <a href="${url}" download="${name}" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg text-sm hover:bg-blue-600 hover:text-white transition-all">下載</a>`;
            fileList.appendChild(div);
        }

        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.innerText = text;
            box.style.backgroundColor = type === 'error' ? '#ef4444' : '#10b981';
            box.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => box.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        downloadAllBtn.addEventListener('click', async () => {
            const zip = new JSZip();
            generatedFiles.forEach(f => zip.file(f.name, f.blob));
            const content = await zip.generateAsync({type: "blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "Split_PDFs.zip";
            link.click();
        });
    </script>
</body>
</html>
