<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 自動拆分工具 (正式版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', 'Microsoft JhengHei', sans-serif; }
        .drop-zone--over { border-color: #3b82f6; background-color: #eff6ff; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 text-gray-800">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">PDF 智慧拆分系統</h1>
            <p class="text-gray-600">請設定 API Key 與規則後開始處理</p>
        </header>

        <div class="bg-amber-50 border border-amber-200 rounded-2xl p-6 mb-8">
            <h3 class="font-bold text-amber-800 mb-2 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                API 安全設定 (請勿寫死在代碼中)
            </h3>
            <input type="password" id="apiKeyInput" placeholder="在此輸入您的 Gemini API Key" class="w-full border-amber-300 rounded-lg shadow-sm focus:ring-amber-500 focus:border-amber-500 border p-2 text-sm">
            <p class="text-xs text-amber-600 mt-2">※ 為了安全，請在每次使用時填寫。部署至 Git 後，直接在代碼中寫死金鑰會導致被 Google 禁用 (403)。</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-8 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <h3 class="font-bold text-lg text-blue-700 flex items-center">基礎分割設定</h3>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">每幾頁分割一次？</label>
                    <input type="number" id="pageSizeInput" value="10" min="1" class="w-full border-gray-300 rounded-lg border p-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">PDF 來源類型</label>
                    <div class="flex space-x-4">
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="pdfType" value="text" checked class="text-blue-600">
                            <span class="ml-2 text-sm">文字型 (解析文字)</span>
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="pdfType" value="image" class="text-blue-600">
                            <span class="ml-2 text-sm">影像型 (AI 辨識)</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="font-bold text-lg text-blue-700 flex items-center">智慧判斷設定</h3>
                <div class="flex items-center">
                    <input type="checkbox" id="enableKeywordCheck" checked class="h-4 w-4 text-blue-600 rounded">
                    <label for="enableKeywordCheck" class="ml-2 text-sm font-medium text-gray-700">啟用關鍵字自動提前分割</label>
                </div>
                <div id="keywordConfigArea">
                    <label class="block text-sm font-medium text-gray-700 mb-1">要偵測的關鍵字</label>
                    <input type="text" id="keywordInput" value="(續次頁)" class="w-full border-gray-300 rounded-lg border p-2">
                </div>
            </div>
        </div>

        <div id="dropZone" class="bg-white border-2 border-dashed border-gray-300 rounded-2xl p-10 text-center transition-all cursor-pointer hover:border-blue-400 hover:bg-blue-50 group shadow-sm">
            <input type="file" id="fileInput" accept=".pdf" class="hidden">
            <div class="flex flex-col items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gray-400 group-hover:text-blue-500 mb-4 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <p class="text-lg font-medium text-gray-700">準備就緒，請拖放檔案至此</p>
            </div>
        </div>

        <div id="confirmSection" class="mt-8 bg-blue-50 border border-blue-200 rounded-2xl p-6 hidden">
            <div class="flex flex-col md:flex-row items-center justify-between">
                <p id="selectedFileName" class="text-lg font-bold text-gray-800 break-all"></p>
                <div class="flex space-x-3">
                    <button id="startProcessBtn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700">確認並開始執行</button>
                    <button id="cancelBtn" class="bg-white text-gray-500 px-6 py-3 rounded-xl border">取消</button>
                </div>
            </div>
        </div>

        <div id="statusSection" class="mt-8 hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold text-gray-800">處理清單</h2>
                <div class="flex space-x-3">
                    <button id="downloadAllBtn" class="hidden bg-green-600 text-white px-4 py-2 rounded-lg text-sm">下載全部 (ZIP)</button>
                    <button id="resetBtn" class="text-sm text-red-500 hover:underline">重新開始</button>
                </div>
            </div>
            <div id="progressBar" class="w-full bg-gray-200 rounded-full h-2.5 mb-6">
                <div id="progressFill" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <div id="fileList" class="space-y-3"></div>
        </div>

        <div id="messageBox" class="fixed bottom-4 right-4 transform translate-y-20 opacity-0 transition-all duration-300 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg z-50"></div>
    </div>

    <canvas id="renderCanvas" style="display:none;"></canvas>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const { PDFDocument } = PDFLib;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusSection = document.getElementById('statusSection');
        const confirmSection = document.getElementById('confirmSection');
        const fileList = document.getElementById('fileList');
        const progressFill = document.getElementById('progressFill');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const messageBox = document.getElementById('messageBox');
        const renderCanvas = document.getElementById('renderCanvas');
        const apiKeyInput = document.getElementById('apiKeyInput');

        let generatedFiles = [];
        let currentFile = null;

        // UI 連動
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drop-zone--over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drop-zone--over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-zone--over');
            if (e.dataTransfer.files.length) prepareFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) prepareFile(e.target.files[0]);
        });

        function prepareFile(file) {
            if (file.type !== 'application/pdf') {
                showMessage('請上傳 PDF 檔案', 'error');
                return;
            }
            currentFile = file;
            document.getElementById('selectedFileName').innerText = file.name;
            confirmSection.classList.remove('hidden');
        }

        document.getElementById('startProcessBtn').addEventListener('click', () => {
            if (!apiKeyInput.value && document.querySelector('input[name="pdfType"]:checked').value === 'image') {
                showMessage('影像辨識模式下，請務必輸入 API Key', 'error');
                return;
            }
            confirmSection.classList.add('hidden');
            handleFile(currentFile);
        });

        document.getElementById('resetBtn').addEventListener('click', () => location.reload());

        // 修正後的 API 調用：更新 URL 與 錯誤處理
        async function checkWithAI(base64Data, keyword) {
            const userKey = apiKeyInput.value.trim();
            const prompt = `請辨識這張圖片中是否包含文字 "${keyword}"。僅回答 JSON 格式：{"found": true} 或 {"found": false}。`;
            const payload = {
                contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64Data } }] }]
            };
            
            // 修正：使用更穩定的 v1beta 呼叫路徑
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${userKey}`;

            try {
                const response = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'API 403 Forbidden - 請檢查 Key 是否有效且具備權限');
                }
                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                // 去除 AI 可能回傳的 Markdown 標籤
                const cleanJson = text.replace(/```json|```/g, '').trim();
                return JSON.parse(cleanJson).found;
            } catch (err) {
                console.error("AI Error:", err);
                throw err;
            }
        }

        async function handleFile(file) {
            const pageSize = parseInt(document.getElementById('pageSizeInput').value) || 10;
            const pdfType = document.querySelector('input[name="pdfType"]:checked').value;
            const targetKeyword = document.getElementById('keywordInput').value;

            statusSection.classList.remove('hidden');
            fileList.innerHTML = '<p class="text-center p-4">處理中...</p>';
            generatedFiles = [];

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdfJsDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const totalPages = pdfJsDoc.numPages;
                const srcDoc = await PDFDocument.load(arrayBuffer);

                fileList.innerHTML = '';
                let currentStart = 0;

                while (currentStart < totalPages) {
                    let targetEnd = Math.min(currentStart + pageSize - 1, totalPages - 1);
                    
                    if (document.getElementById('enableKeywordCheck').checked && targetEnd < totalPages - 1) {
                        let keywordFound = false;
                        const page = await pdfJsDoc.getPage(targetEnd + 1);

                        if (pdfType === 'text') {
                            const textContent = await page.getTextContent();
                            const pageText = textContent.items.map(item => item.str).join(' ');
                            if (pageText.includes(targetKeyword)) keywordFound = true;
                        } else {
                            const viewport = page.getViewport({ scale: 1.5 });
                            const context = renderCanvas.getContext('2d');
                            renderCanvas.height = viewport.height;
                            renderCanvas.width = viewport.width;
                            await page.render({ canvasContext: context, viewport: viewport }).promise;
                            const base64Image = renderCanvas.toDataURL('image/png').split(',')[1];
                            keywordFound = await checkWithAI(base64Image, targetKeyword);
                        }

                        if (keywordFound) targetEnd--; 
                    }

                    if (targetEnd < currentStart) targetEnd = currentStart;

                    const newPdf = await PDFDocument.create();
                    const pageIndices = Array.from({length: targetEnd - currentStart + 1}, (_, i) => currentStart + i);
                    const copiedPages = await newPdf.copyPages(srcDoc, pageIndices);
                    copiedPages.forEach(p => newPdf.addPage(p));

                    const pdfBytes = await newPdf.save();
                    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                    const fileName = `${currentStart + 1}-${targetEnd + 1}.pdf`;
                    
                    generatedFiles.push({ name: fileName, blob: blob });
                    createFileItem(fileName, URL.createObjectURL(blob));

                    progressFill.style.width = `${Math.round(((targetEnd + 1) / totalPages) * 100)}%`;
                    currentStart = targetEnd + 1;
                }
                downloadAllBtn.classList.remove('hidden');
                showMessage('處理完成！', 'success');
            } catch (error) {
                showMessage(error.message, 'error');
                fileList.innerHTML = `<p class="text-red-500 p-4">錯誤：${error.message}</p>`;
            }
        }

        function createFileItem(name, url) {
            const div = document.createElement('div');
            div.className = 'flex items-center justify-between bg-white p-4 rounded-xl border';
            div.innerHTML = `<span>${name}</span><a href="${url}" download="${name}" class="text-blue-600 font-medium">下載</a>`;
            fileList.appendChild(div);
        }

        function showMessage(text, type) {
            messageBox.innerText = text;
            messageBox.style.backgroundColor = type === 'error' ? '#ef4444' : '#10b981';
            messageBox.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => messageBox.classList.add('translate-y-20', 'opacity-0'), 4000);
        }

        downloadAllBtn.addEventListener('click', async () => {
            const zip = new JSZip();
            generatedFiles.forEach(f => zip.file(f.name, f.blob));
            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "Split_PDFs.zip";
            link.click();
        });
    </script>
</body>
</html>
